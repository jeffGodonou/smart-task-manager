services:
  - type: web
    runtime: docker
    name: smart-task-manager-backend
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    disks:
      - name: task-data
        mountPath: /var/data
        sizeGB: 1
    envVars:
      - key: H2_JDBC_URL
        value: jdbc:h2:file:/var/data/taskdb;AUTO_SERVER=TRUE;DB_CLOSE_ON_EXIT=FALSE
      - key: JWT_SECRET
        sync: false
